version: 1
default:
  evidence_pick: "highest_weight_sentence"
  score_clamp: [0, 100]

rules:
  - id: PAY_EXCL_001
    axis: PAYMENT
    tag: EXCLUSION_EXPANSION
    weight: 30
    regex:
      - "(보험금|급여금|지급금).*(지급하지|지급하(지\\s*)?아니)"
      - "(보상|지급)\\s*하지\\s*않는다"
    window_keywords: ["보험금", "지급", "보상"]
    recommendation_type: ADD_EXCEPTION
    recommendation_hint: "면책/지급거절 적용 범위를 예외/단서로 제한"

  - id: PAY_COND_001
    axis: PAYMENT
    tag: PAYMENT_CONDITION_TIGHTENING
    weight: 25
    regex:
      - "(다음|아래)\\s*(각\\s*)?(요건|조건)\\s*을\\s*(모두|전부)\\s*충족"
      - "(요건|조건)\\s*을\\s*(모두|전부)\\s*갖추"
    window_keywords: ["보험금", "지급", "요건", "조건"]
    recommendation_type: LIMIT_SCOPE
    recommendation_hint: "요건 누락 시 전면 부지급이 아닌 부분 지급/예외 검토"

  - id: PAY_DISC_001
    axis: PAYMENT
    tag: DISCRETION
    weight: 20
    regex:
      - "(회사|당사)\\s*(가|는)\\s*(판단|인정)\\s*(하는|한)\\s*경우"
      - "필요하다고\\s*(판단|인정)"
    window_keywords: ["지급", "보험금", "보상", "면책"]
    recommendation_type: REWORD
    recommendation_hint: "재량 문구를 객관 요건으로 치환하거나 판단 기준을 추가"

  - id: PAY_AMB_001
    axis: PAYMENT
    tag: AMBIGUITY
    weight: 10
    regex:
      - "(상당한|중대한|현저한|적절한|합리적인|통상적인)"
      - "의학적으로\\s*인정(?:되는|된)"
    window_keywords: ["지급", "보험금", "보상", "면책", "감액", "제한", "진단", "검사"]
    recommendation_type: ADD_DEFINITION
    recommendation_hint: "추상어/의학적 인정의 판단 기준을 정의로 구체화"

  - id: PAY_LIMIT_001
    axis: PAYMENT
    tag: PAYMENT_LIMITATION_EXPANSION
    weight: 25
    regex:
      - "(최대|상한|한도)\\s*(금액|액|)"
      - "(총액|합계).*(한도|상한)"
    window_keywords: ["보험금", "지급", "한도", "최대", "상한"]
    recommendation_type: REWORD
    recommendation_hint: "한도 산정 기준/단위를 명확화"

  - id: PAY_PROC_001
    axis: PROCEDURE
    tag: PROCEDURAL_BURDEN
    weight: 10
    regex:
      - "(청구|통지).*(\\d+)\\s*(일|개월|년)\\s*(이내|내)"
      - "(\\d+)\\s*(일|개월|년)\\s*(이내|내).*(청구|통지)"
    window_keywords: ["청구", "통지", "보험금", "지급"]
    recommendation_type: ALIGN_TO_PEERS
    recommendation_hint: "청구/통지 기한 단축 여부를 동종 대비 점검"

